<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>imobWeb - Offline</title>
  <meta name="description" content="Você está offline no imobWeb CRM">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: #f0f4ff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    h1 {
      color: #1a202c;
      font-size: 24px;
      margin-bottom: 12px;
    }
    p {
      color: #718096;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .retry-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }
    .tips {
      margin-top: 24px;
      padding: 16px;
      background: #f7fafc;
      border-radius: 12px;
      text-align: left;
    }
    .tips h3 {
      font-size: 14px;
      color: #4a5568;
      margin-bottom: 8px;
    }
    .tips ul {
      font-size: 13px;
      color: #718096;
      padding-left: 20px;
    }
    .tips li { margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>Você está offline</h1>
    <p>Conecte-se à internet para acessar seus imóveis, leads e continuar trabalhando no imobWeb.</p>
    <button class="retry-btn" onclick="location.reload()">Tentar novamente</button>
    <div class="tips">
      <h3>Dicas enquanto espera:</h3>
      <ul>
        <li>Verifique sua conexão Wi-Fi</li>
        <li>Certifique-se de que os dados móveis estão ativos</li>
        <li>Tente mover-se para um local com melhor sinal</li>
      </ul>
    </div>
  </div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('online', () => location.reload());
    }
  </script>
</body>
</html>

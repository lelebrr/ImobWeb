name: Production Smoke & Health Check

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  smoke-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      
      - name: Run Production Smoke Tests
        run: npx vitest run tests/qa/smoke-tests.ts
        env:
          BASE_URL: 'https://imobweb.com.br' # Production URL
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Accessibility Audit
        run: npx playwright test tests/e2e/visual-regression.spec.ts --project=chromium
        env:
          BASE_URL: 'https://imobweb.com.br'

      - name: Notify on Failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_COLOR: '#FF0000'
          SLACK_MESSAGE: '🚨 Alerta de Produção imobWeb: Smoke tests ou Acessibilidade falharam!'
          SLACK_TITLE: 'Falha em Produção'
